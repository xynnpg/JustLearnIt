{% extends "studio_base.html" %}

{% block title %}{{ lesson_title }} - JustLearnIt{% endblock %}

{% block studio_content %}
<div class="studio-container">
    <div class="page-header">
        <h1><i class="{{ subject.icon }}"></i> {{ lesson_title }}</h1>
        <div class="user-info">
            <span class="badge badge-primary">{{ current_user.name }}</span>
            <img src="{{ current_user.avatar_url or url_for('static', filename='images/default-avatar.png') }}" alt="Avatar" class="avatar">
        </div>
    </div>

    <div class="content-area">
        <div class="view-lesson-content">
            {{ content|safe }}
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('studio.edit_lesson', subject=subject, lesson=lesson_title) }}" class="btn btn-primary">
                <i class="fas fa-edit"></i> Edit Lesson
            </a>
            <a href="{{ url_for('studio.lessons', subject=subject) }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Lessons
            </a>
        </div>
    </div>
</div>

<style>
.studio-container {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
}

.page-header h1 {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0;
    color: var(--light-text);
}

.page-header h1 i {
    color: var(--primary-color);
}

.content-area {
    background-color: var(--card-bg);
    border-radius: var(--radius-md);
    padding: 2rem;
    margin-bottom: 2rem;
    width: 100%;
    box-sizing: border-box;
}

.view-lesson-content {
    margin-bottom: 2rem;
    overflow-x: auto;
}

.form-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

@media (max-width: 768px) {
    .content-area {
        padding: 1rem;
    }
    
    .form-actions {
        flex-direction: column;
    }
    
    .btn {
        width: 100%;
    }
}
</style>
{% endblock %}
